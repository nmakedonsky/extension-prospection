<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prospection</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <h1>Prospection</h1>
  <p class="subtitle">Badges SS2I / Client sur LinkedIn. Les journaux d’activité sont dans Supabase (<code>extension_logs</code>).</p>

  <section class="block">
    <h2>Gemini</h2>
    <label for="geminiKey">Clé API (Google AI Studio)</label>
    <input type="password" id="geminiKey" autocomplete="off" placeholder="AIza…">
    <div class="row">
      <button type="button" id="saveGemini" class="secondary">Enregistrer</button>
      <button type="button" id="testGemini">Tester</button>
    </div>
    <p id="geminiStatus" class="status" aria-live="polite"></p>
  </section>

  <section class="block">
    <h2>Supabase</h2>
    <label for="supabaseUrl">URL du projet</label>
    <input type="text" id="supabaseUrl" autocomplete="off" placeholder="https://….supabase.co">
    <label for="supabaseKey">Clé anon</label>
    <input type="password" id="supabaseKey" autocomplete="off" placeholder="eyJ…">
    <div class="row">
      <button type="button" id="saveSupabase" class="secondary">Enregistrer</button>
      <button type="button" id="testSupabase">Tester</button>
    </div>
    <p id="supabaseStatus" class="status" aria-live="polite"></p>
  </section>

  <section class="block">
    <h2>LinkedIn Collections</h2>
    <p class="hint">Sélecteurs optionnels si le DOM de votre build diffère. Laisser vide pour la détection automatique (liens <code>/jobs/view/</code> + géométrie).</p>
    <label for="linkedinCollectionsCardCss">Carte (liste) — CSS</label>
    <input type="text" id="linkedinCollectionsCardCss" autocomplete="off" placeholder="ex. li.jobs-collection-job-card">
    <label for="linkedinCollectionsCompanyCss">Nom société — CSS relatif à la carte</label>
    <input type="text" id="linkedinCollectionsCompanyCss" autocomplete="off" placeholder="ex. .artdeco-entity-lockup__subtitle">
    <div class="row">
      <button type="button" id="saveLinkedinSelectors" class="secondary">Enregistrer</button>
      <button type="button" id="runDomDiagnostic">Diagnostic DOM</button>
    </div>
    <p id="linkedinDiagStatus" class="status" aria-live="polite"></p>
    <label for="linkedinDiagOut">Rapport (onglet LinkedIn Jobs actif)</label>
    <textarea id="linkedinDiagOut" class="diag-out" readonly rows="10" placeholder='Cliquez sur « Diagnostic DOM » sur une page /jobs/collections ou /jobs/search-results…'></textarea>
    <button type="button" id="copyDomDiagnostic" class="secondary full-width">Copier le rapport</button>
  </section>

  <section class="block">
    <h2>HubSpot</h2>
    <label for="hubspotRegion">Région API</label>
    <select id="hubspotRegion">
      <option value="eu">EU (api-eu1.hubapi.com)</option>
      <option value="us">US (api.hubapi.com)</option>
    </select>
    <label for="hubspotKey">Clé Private App</label>
    <input type="password" id="hubspotKey" autocomplete="off" placeholder="pat-… ou eu1-…">
    <div class="row">
      <button type="button" id="saveHubspot" class="secondary">Enregistrer</button>
      <button type="button" id="testHubspot">Tester</button>
    </div>
    <p id="hubspotStatus" class="status" aria-live="polite"></p>
  </section>

  <script src="popup.js"></script>
</body>
</html>
